name: Windows_RDP_OttO
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean GitHub Pre-installed WebDrivers
        run: Remove-Item -Path "C:\SeleniumWebDrivers" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run Installer Script
        run: powershell -ExecutionPolicy Bypass -File ./Installer.ps1

      - name: Install and Run Tailscale
        run: |
          Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          
          Write-Host "Waiting for Tailscale to finish installing..."
          $exePath = "C:\Program Files\Tailscale\tailscale.exe"
          $timeout = 60
          while (-not (Test-Path $exePath) -and $timeout -gt 0) {
              Start-Sleep -Seconds 2
              $timeout -= 2
          }
          
          if (-not (Test-Path $exePath)) {
              Write-Error "Tailscale installation timed out!"
              exit 1
          }
          
          Write-Host "Tailscale installed successfully. Starting connection..."
          & $exePath up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --unattended
      
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server'-name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
      
      - name: Create New User
        run: |
          net user OttO4ExE auxNd6OSIjcgUI /add
          net localgroup administrators OttO4ExE /add
      
      - name: Keep Alive for 6 hours
        run: sleep 21600
